<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SaberWolf | Minha equipe</title>

  <link rel="stylesheet" href="../css/layout/sbw-sidebar.css" />
  <link rel="stylesheet" href="../css/teams.css" />
</head>

<body class="sbw-team-admin-body sbw-has-sidebar sbw-sidebar-no-transition" data-sbw-active-page="teams">
  <div id="sbwSidebarMount"></div>

  <button
    class="sbw-sidebar-toggle"
    type="button"
    aria-label="Abrir menu"
    data-sbw-sidebar-toggle
  >
    ☰
  </button>

  <div class="sbw-sidebar-backdrop" data-sbw-sidebar-close></div>

  <main class="sbw-team-admin-page">
    <section class="sbw-teams-hero sbw-team-admin-hero-v2">
      <div class="sbw-teams-kicker">Painel da equipe</div>

      <h1 class="sbw-teams-title">
        Minha equipe
      </h1>

      <p class="sbw-teams-subtitle">
        Gerencie as informações públicas da sua equipe, identidade visual, modalidades,
        redes sociais, recrutamento e convites de jogadores.
      </p>

      <div class="sbw-teams-actions">
        <a class="sbw-team-btn" href="equipes.html">
          Ver equipes
        </a>

        <a class="sbw-team-btn" href="criar-equipe.html">
          Criar equipe
        </a>
      </div>
    </section>

    <section data-team-admin-root>
      <div class="sbw-empty-state">
        Carregando painel da equipe...
      </div>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../js/supabase/supabase-config.js"></script>
  <script defer src="../js/supabase/supabase-client.js"></script>
  <script defer src="../js/auth/auth-service.js"></script>
  <script defer src="../js/layout/sbw-sidebar.js"></script>

  <script defer src="../js/profiles/profiles-config.js"></script>
  <script defer src="../js/profiles/profiles-models.js"></script>
  <script defer src="../js/profiles/profiles-storage.js"></script>

  <script defer src="../js/teams/teams-config.js"></script>
  <script defer src="../js/teams/teams-demo-data.js"></script>
  <script defer src="../js/teams/teams-models.js"></script>
  <script defer src="../js/teams/teams-storage.js"></script>
  <script defer src="../js/teams/team-admin-page.js"></script>
</body>
</html>
