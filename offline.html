<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>-SBW- | Offline</title>
  <meta name="theme-color" content="#37c8ff" />
  <style>
    :root {
      color-scheme: dark;
      --cyan: #37c8ff;
      --text: #f4f8ff;
      --muted: rgba(230, 241, 255, 0.72);
      --bg: #030812;
      --panel: rgba(8, 18, 35, 0.84);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 82% 10%, rgba(55, 200, 255, 0.18), transparent 28%),
        radial-gradient(circle at 16% 82%, rgba(126, 68, 255, 0.16), transparent 30%),
        linear-gradient(180deg, #030812, #02050b);
    }

    main {
      width: min(720px, 100%);
      padding: clamp(28px, 6vw, 54px);
      border-radius: 32px;
      background:
        radial-gradient(circle at 18% 0%, rgba(55, 200, 255, 0.14), transparent 32%),
        var(--panel);
      border: 1px solid rgba(76, 202, 255, 0.24);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
    }

    img {
      width: 86px;
      height: 86px;
      border-radius: 22px;
      display: block;
      margin-bottom: 28px;
      border: 1px solid rgba(76, 202, 255, 0.28);
    }

    span {
      display: inline-flex;
      margin-bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      color: #9be8ff;
      background: rgba(55, 200, 255, 0.08);
      border: 1px solid rgba(76, 202, 255, 0.28);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 8vw, 58px);
      line-height: 1;
      letter-spacing: -0.06em;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    a {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border-radius: 14px;
      color: #02101d;
      background: linear-gradient(135deg, #5ddcff, #008dff);
      text-decoration: none;
      font-weight: 900;
    }

    .sbw-offline-version {
      margin: 18px 0 0;
      color: rgba(230, 241, 255, 0.48);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/icons/icon-192-v3.png" alt="-SBW-" />
    <span>App -SBW- Beta</span>
    <h1>Você está offline</h1>
    <p>
      Não foi possível carregar a plataforma agora. Verifique sua conexão e tente novamente.
      Dados de login, perfis, equipes, torneios e Supabase não são armazenados para uso offline nesta versão.
    </p>
    <a href="/">Voltar para a Home</a>
    <p class="sbw-offline-version">Site v1.6.80.6 · App -SBW- Beta v0.2</p>
  </main>
</body>
</html>
