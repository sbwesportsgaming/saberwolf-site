<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Detalhe do Torneio | -SBW-</title>

  <meta
    name="description"
    content="Página pública de torneio da SaberWolf eSports. Veja informações, regras, participantes, cronograma, inscrição e estrutura competitiva."
  >

  <link rel="icon" href="../assets/images/logo-sbw.jpg" type="image/jpeg">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/torneios.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <style>
    .tournament-detail-page {
      display: grid;
      gap: 0;
    }

    .detail-hero {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top left, rgba(214, 168, 79, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.1), transparent 34%),
        rgba(8, 10, 16, 0.96);
    }

    .detail-hero-content {
      display: grid;
      gap: 18px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 58px 20px 34px;
    }

    .detail-back-link {
      display: inline-flex;
      width: fit-content;
      gap: 8px;
      align-items: center;
      color: var(--muted, #9ca3af);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 800;
    }

    .detail-back-link:hover {
      color: var(--gold, #d6a84f);
    }

    .detail-hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
      gap: 22px;
      align-items: stretch;
    }

    .detail-hero-main {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .detail-hero-main h2 {
      margin: 0;
      color: var(--text, #f5f5f5);
      font-size: clamp(2rem, 4vw, 3.35rem);
      line-height: 1;
    }

    .detail-hero-main p {
      max-width: 780px;
      margin: 0;
      color: var(--muted, #9ca3af);
      font-size: 1rem;
      line-height: 1.6;
    }

    .detail-hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .detail-hero-tags span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.09);
      color: var(--muted, #9ca3af);
      font-size: 0.75rem;
      font-weight: 800;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .status-pill.open {
      background: rgba(34, 197, 94, 0.13);
      border: 1px solid rgba(34, 197, 94, 0.26);
      color: #86efac;
    }

    .status-pill.running {
      background: rgba(56, 189, 248, 0.13);
      border: 1px solid rgba(56, 189, 248, 0.26);
      color: #7dd3fc;
    }

    .status-pill.finished {
      background: rgba(214, 168, 79, 0.13);
      border: 1px solid rgba(214, 168, 79, 0.28);
      color: #f7d28a;
    }

    .status-pill.draft {
      background: rgba(148, 163, 184, 0.13);
      border: 1px solid rgba(148, 163, 184, 0.22);
      color: #cbd5e1;
    }

    .detail-summary-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid rgba(214, 168, 79, 0.22);
      background: rgba(8, 10, 16, 0.72);
      backdrop-filter: blur(12px);
    }

    .detail-summary-grid {
      display: grid;
      gap: 8px;
    }

    .detail-summary-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .detail-summary-item span {
      color: var(--muted, #9ca3af);
      font-size: 0.74rem;
    }

    .detail-summary-item strong {
      color: var(--text, #f5f5f5);
      font-size: 0.8rem;
      text-align: right;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .detail-btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 40px;
      padding: 0 13px;
      border-radius: 999px;
      border: 1px solid rgba(214, 168, 79, 0.3);
      background: rgba(214, 168, 79, 0.14);
      color: var(--gold, #d6a84f);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 900;
      cursor: pointer;
    }

    .detail-btn.secondary {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text, #f5f5f5);
    }

    .detail-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .detail-nav-section {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(8, 10, 16, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .detail-nav {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .detail-nav a {
      padding: 8px 10px;
      border-radius: 999px;
      color: var(--muted, #9ca3af);
      text-decoration: none;
      font-size: 0.76rem;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .detail-nav a:hover {
      color: var(--gold, #d6a84f);
      border-color: rgba(214, 168, 79, 0.25);
    }

    .detail-content {
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 20px 60px;
      display: grid;
      gap: 22px;
    }

    .detail-section {
      display: grid;
      gap: 14px;
    }

    .detail-section-header {
      display: grid;
      gap: 5px;
    }

    .detail-section-header span {
      color: var(--gold, #d6a84f);
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .detail-section-header h3 {
      margin: 0;
      color: var(--text, #f5f5f5);
      font-size: 1.35rem;
    }

    .detail-card {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(255, 255, 255, 0.035);
    }

    .detail-card p {
      margin: 0;
      color: var(--muted, #9ca3af);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .timeline-grid,
    .stats-grid,
    .participants-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }

    .info-mini-card {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.075);
    }

    .info-mini-card span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted, #9ca3af);
      font-size: 0.72rem;
      font-weight: 800;
    }

    .info-mini-card strong {
      display: block;
      color: var(--text, #f5f5f5);
      font-size: 0.94rem;
    }

    .participant-card {
      display: grid;
      gap: 6px;
      padding: 13px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .participant-card strong {
      color: var(--text, #f5f5f5);
      font-size: 0.92rem;
    }

    .participant-card span {
      color: var(--muted, #9ca3af);
      font-size: 0.76rem;
    }

    .participant-status {
      width: fit-content;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.22);
      color: #7dd3fc;
      font-size: 0.68rem;
      font-weight: 900;
    }

    .registration-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid rgba(34, 197, 94, 0.22);
      background: rgba(34, 197, 94, 0.065);
    }

    .registration-card strong {
      color: #86efac;
    }

    .registration-card p {
      margin: 0;
      color: var(--muted, #9ca3af);
      line-height: 1.55;
    }

    .public-table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .public-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: rgba(8, 10, 16, 0.54);
    }

    .public-table th,
    .public-table td {
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      color: var(--text, #f5f5f5);
      font-size: 0.82rem;
      text-align: left;
    }

    .public-table th {
      color: var(--gold, #d6a84f);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(255, 255, 255, 0.04);
    }

    .public-table td {
      color: var(--muted, #9ca3af);
    }

    .public-table td strong {
      color: var(--text, #f5f5f5);
    }

    .groups-public-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .public-group-card {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(214, 168, 79, 0.18);
      background: rgba(214, 168, 79, 0.055);
      display: grid;
      gap: 10px;
    }

    .public-group-card h4 {
      margin: 0;
      color: var(--gold, #d6a84f);
    }

    .public-group-player {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px;
      border-radius: 12px;
      background: rgba(8, 10, 16, 0.52);
      color: var(--muted, #9ca3af);
      font-size: 0.78rem;
    }

    .public-group-player strong {
      color: var(--text, #f5f5f5);
    }

    .public-group-player.qualified {
      border: 1px solid rgba(214, 168, 79, 0.28);
      background: rgba(214, 168, 79, 0.12);
    }

    .public-group-player.qualified strong {
      color: var(--gold, #d6a84f);
    }

    .playoffs-public-block {
      display: grid;
      gap: 16px;
    }

    .public-bracket-card {
      overflow-x: auto;
    }

    .public-final-card {
      max-width: 420px;
    }

    .bracket-public-area {
      overflow-x: auto;
      padding: 10px 0 18px;
    }

    .bracket-public {
      --bracket-gap: 78px;
      display: flex;
      gap: var(--bracket-gap);
      align-items: flex-start;
      min-width: max-content;
      padding: 4px 44px 14px 0;
    }

    .bracket-public-round {
      min-width: 220px;
      display: grid;
      gap: 12px;
      align-content: start;
      position: relative;
    }

    .bracket-public-round h4 {
      margin: 0;
      color: var(--gold, #d6a84f);
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .bracket-public-round-matches {
      --slot-height: 118px;
      display: grid;
      grid-template-rows: repeat(var(--base-match-count), var(--slot-height));
      gap: 0;
      min-height: calc(var(--base-match-count) * var(--slot-height));
      position: relative;
      padding-top: 0;
    }

    .bracket-public-match {
      grid-row: var(--grid-row, auto);
      align-self: center;
      position: relative;
      display: grid;
      gap: 6px;
      min-height: 78px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .bracket-public-match.has-next-round::after {
      content: "";
      position: absolute;
      top: 50%;
      right: calc(var(--bracket-gap) * -1);
      width: var(--bracket-gap);
      height: 2px;
      background: linear-gradient(
        90deg,
        rgba(214, 168, 79, 0.78),
        rgba(214, 168, 79, 0.18)
      );
      transform: translateY(-50%);
      pointer-events: none;
    }

    .bracket-public-match.has-next-round.connect-down::before,
    .bracket-public-match.has-next-round.connect-up::before {
      content: "";
      position: absolute;
      right: calc(var(--bracket-gap) * -1);
      width: 2px;
      background: rgba(214, 168, 79, 0.42);
      pointer-events: none;
    }

    .bracket-public-match.has-next-round.connect-down::before {
      top: 50%;
      height: var(--connector-height, 118px);
    }

    .bracket-public-match.has-next-round.connect-up::before {
      bottom: 50%;
      height: var(--connector-height, 118px);
    }

    .bracket-public-player {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 7px;
      border-radius: 10px;
      background: rgba(8, 10, 16, 0.52);
      color: var(--muted, #9ca3af);
      font-size: 0.78rem;
    }

    .bracket-public-player.winner {
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.2);
      background: rgba(34, 197, 94, 0.07);
    }


    .bracket-public-match.completed {
      border-color: rgba(34, 197, 94, 0.18);
      background:
        linear-gradient(135deg, rgba(34, 197, 94, 0.055), rgba(255, 255, 255, 0.035)),
        rgba(255, 255, 255, 0.04);
    }

    .bracket-public-match-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 3px;
    }

    .bracket-winner-label {
      color: #86efac;
      font-size: 0.68rem;
      font-weight: 900;
    }

        .league-public-block {
      display: grid;
      gap: 16px;
    }

    .league-rounds-public {
      display: grid;
      gap: 12px;
    }

    .league-round-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.035);
    }

    .league-round-card h4 {
      margin: 0;
      color: var(--gold, #d6a84f);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .league-match-list {
      display: grid;
      gap: 8px;
    }

    .league-match-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 9px;
      border-radius: 12px;
      background: rgba(8, 10, 16, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted, #9ca3af);
      font-size: 0.78rem;
    }

    .league-match-row strong {
      color: var(--text, #f5f5f5);
    }

    .league-match-row .player-b {
      text-align: right;
    }

    .league-match-score {
      min-width: 54px;
      padding: 5px 8px;
      border-radius: 999px;
      text-align: center;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted, #9ca3af);
      font-weight: 900;
    }

    .league-match-row.completed .league-match-score {
      background: rgba(214, 168, 79, 0.14);
      border: 1px solid rgba(214, 168, 79, 0.28);
      color: var(--gold, #d6a84f);
    }


    .league-match-row strong.winner {
      color: #86efac;
    }

    .league-match-status-pill,
    .bracket-status-pill {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: fit-content;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(148, 163, 184, 0.09);
      color: #cbd5e1;
      font-size: 0.66rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .league-match-status-pill.completed,
    .bracket-status-pill.completed {
      border-color: rgba(34, 197, 94, 0.28);
      background: rgba(34, 197, 94, 0.11);
      color: #86efac;
    }

    .league-match-status-pill.live,
    .bracket-status-pill.live {
      border-color: rgba(56, 189, 248, 0.3);
      background: rgba(56, 189, 248, 0.12);
      color: #7dd3fc;
    }

    .league-match-status-pill.bye,
    .bracket-status-pill.bye {
      border-color: rgba(214, 168, 79, 0.28);
      background: rgba(214, 168, 79, 0.1);
      color: var(--gold, #d6a84f);
    }

        .match-history-accordion {
      border-radius: 18px;
      border: 1px solid rgba(214, 168, 79, 0.18);
      background: rgba(214, 168, 79, 0.045);
      overflow: hidden;
    }

    .match-history-accordion summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 15px;
      color: var(--gold, #d6a84f);
      font-size: 0.82rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .match-history-accordion summary::-webkit-details-marker {
      display: none;
    }

    .match-history-accordion summary::after {
      content: "+";
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.09);
      color: var(--text, #f5f5f5);
      font-size: 1rem;
      line-height: 1;
    }

    .match-history-accordion[open] summary::after {
      content: "–";
    }

    .match-history-body {
      display: grid;
      gap: 12px;
      padding: 0 14px 14px;
    }

    .not-found-state {
      min-height: 60vh;
      display: grid;
      place-items: center;
      padding: 30px 20px;
    }

    .not-found-card {
      max-width: 620px;
      padding: 22px;
      border-radius: 22px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
    }

    .not-found-card h2 {
      color: var(--text, #f5f5f5);
    }

    .not-found-card p {
      color: var(--muted, #9ca3af);
      line-height: 1.6;
    }

        /* ==========================
       Detalhe do torneio — SBW visual v1
       ========================== */

    .detail-hero {
      border-bottom: 1px solid rgba(56, 189, 248, 0.16);
      background:
        radial-gradient(circle at 12% 8%, rgba(56, 189, 248, 0.28), transparent 34%),
        radial-gradient(circle at 88% 72%, rgba(14, 165, 233, 0.14), transparent 36%),
        linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 0.98));
    }

    .detail-back-link:hover {
      color: #38bdf8;
    }

    .detail-hero-tags span {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(56, 189, 248, 0.14);
      color: #cbd5e1;
    }

    .detail-summary-card {
      border: 1px solid rgba(56, 189, 248, 0.2);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 42%),
        rgba(15, 23, 42, 0.82);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    .detail-summary-item {
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(56, 189, 248, 0.1);
    }

    .detail-btn {
      border: 1px solid rgba(56, 189, 248, 0.48);
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
      transition:
        border-color 0.18s ease,
        background 0.18s ease,
        color 0.18s ease,
        transform 0.18s ease;
    }

    .detail-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(56, 189, 248, 0.72);
      background: rgba(56, 189, 248, 0.15);
      color: #f8fafc;
    }

    .detail-btn.secondary {
      border: 1px solid rgba(56, 189, 248, 0.24);
      background: rgba(15, 23, 42, 0.9);
      color: #dbeafe;
    }

    .detail-nav-section {
      background: rgba(2, 6, 23, 0.9);
      border-bottom: 1px solid rgba(56, 189, 248, 0.12);
    }

    .detail-nav a {
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(56, 189, 248, 0.1);
      color: #cbd5e1;
    }

    .detail-nav a:hover {
      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.34);
      background: rgba(56, 189, 248, 0.08);
    }

    .detail-section-header span,
    .public-table th,
    .public-group-card h4,
    .bracket-public-round h4,
    .league-round-card h4 {
      color: #38bdf8;
    }

    .detail-card,
    .info-mini-card,
    .participant-card,
    .league-round-card,
    .not-found-card {
      border: 1px solid rgba(56, 189, 248, 0.1);
      background: rgba(15, 23, 42, 0.62);
    }

    .info-mini-card,
