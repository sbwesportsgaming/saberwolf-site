<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizador de Torneios | -SBW-</title>
  <meta
    name="description"
    content="Perfil público individual de Organizador de Torneios da -SBW-, com torneios, temporadas, rankings e histórico do organizador."
  />

  <link rel="icon" href="../assets/images/logo-sbw.png" type="image/png" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/layout/sbw-sidebar.css" />
  <link rel="stylesheet" href="../css/torneios.css" />
  <link rel="stylesheet" href="../css/organizers/organizer-profile.css" />
  <link rel="stylesheet" href="../css/core/sbw-page-state.css" />
  <link rel="stylesheet" href="../css/core/sbw-site-compliance.css" />
</head>

<body class="sbw-tournaments-body sbw-organizer-profile-body sbw-sidebar-no-transition" data-sbw-active-page="organizers">
  <div id="sbwSidebarMount"></div>

  <button class="sbw-sidebar-toggle" type="button" aria-label="Abrir menu" data-sbw-sidebar-toggle>☰</button>
  <div class="sbw-sidebar-backdrop" data-sbw-sidebar-close></div>

  <main class="sbw-organizer-profile-page" id="organizerPageRoot">
    <section class="sbw-organizer-profile-topbar" aria-label="Navegação do organizador">
      <a class="sbw-organizer-back-link" href="../organizadores/organizadores.html">
        <span aria-hidden="true">←</span>
        Organizadores
      </a>
      <p id="organizerStatusText">Carregando perfil público do organizador...</p>
    </section>

    <section class="sbw-organizer-public-hero" id="organizerHero" aria-label="Perfil público do organizador">
      <div class="sbw-organizer-loading-card">Carregando organizador...</div>
    </section>

    <nav class="sbw-organizer-tabs-shell" aria-label="Áreas públicas do organizador">
      <div class="sbw-organizer-tabs" role="tablist">
        <button class="is-active" type="button" data-organizer-tab="overview">Visão Geral</button>
        <button type="button" data-organizer-tab="tournaments">Torneios</button>
        <button type="button" data-organizer-tab="seasons">Temporadas</button>
        <button type="button" data-organizer-tab="rankings">Rankings</button>
        <button type="button" data-organizer-tab="history">Histórico</button>
      </div>
      <div class="sbw-organizer-nav-actions" id="organizerNavActions" aria-label="Ações do organizador"></div>
    </nav>

    <section class="sbw-organizer-tab-panel is-active" id="organizerTabOverview" data-organizer-panel="overview">
      <div class="sbw-organizer-overview-layout sbw-organizer-overview-layout--tournaments-first">
        <article class="sbw-organizer-section-card sbw-organizer-section-card--overview-tournaments">
          <div class="sbw-organizer-section-head">
            <div>
              <span class="sbw-organizer-eyebrow">Visão Geral</span>
              <h2>Torneios</h2>
            </div>
            <button class="sbw-organizer-small-action" type="button" data-organizer-tab-shortcut="tournaments">Ver todos</button>
          </div>
          <div class="sbw-organizer-overview-tournament-grid" id="organizerOverviewTournaments"></div>
        </article>

        <article class="sbw-organizer-section-card sbw-organizer-section-card--overview-rankings">
          <div class="sbw-organizer-section-head">
            <div>
              <span class="sbw-organizer-eyebrow">Classificação</span>
              <h2>Rankings</h2>
            </div>
          </div>
          <div class="sbw-organizer-ranking-layout sbw-organizer-ranking-layout--overview" id="organizerOverviewRankingGrid"></div>
        </article>
      </div>

      <section class="sbw-organizer-lower-metrics" aria-label="Resumo inferior do organizador">
        <div class="sbw-organizer-stats-grid" id="organizerStats"></div>
      </section>
    </section>

    <section class="sbw-organizer-tab-panel" id="organizerTabTournaments" data-organizer-panel="tournaments" hidden>
      <article class="sbw-organizer-section-card">
        <div class="sbw-organizer-section-head sbw-organizer-section-head--stacked">
          <div>
            <span class="sbw-organizer-eyebrow">Torneios</span>
            <h2>Torneios</h2>
          </div>
          <div class="sbw-organizer-filter-row">
            <input id="organizerTournamentSearch" type="search" placeholder="Buscar torneio..." />
            <select id="organizerTournamentStatusFilter" aria-label="Filtrar por status">
              <option value="all">Todos os status</option>
              <option value="open">Inscrições abertas</option>
              <option value="running">Em andamento</option>
              <option value="finished">Finalizados</option>
              <option value="draft">Rascunho</option>
            </select>
          </div>
        </div>
        <div class="sbw-organizer-tournament-grid" id="organizerTournamentsGrid"></div>
      </article>
    </section>

    <section class="sbw-organizer-tab-panel" id="organizerTabSeasons" data-organizer-panel="seasons" hidden>
      <article class="sbw-organizer-section-card">
        <div class="sbw-organizer-section-head">
          <div>
            <span class="sbw-organizer-eyebrow">Temporadas</span>
            <h2>Temporadas</h2>
          </div>
        </div>
        <div class="sbw-organizer-empty-state" id="organizerSeasonsGrid">
          Nenhuma temporada pública encontrada.
        </div>
      </article>
    </section>

    <section class="sbw-organizer-tab-panel" id="organizerTabRankings" data-organizer-panel="rankings" hidden>
      <article class="sbw-organizer-section-card">
        <div class="sbw-organizer-section-head">
          <div>
            <span class="sbw-organizer-eyebrow">Rankings</span>
            <h2>Ranking geral</h2>
          </div>
        </div>
        <div class="sbw-organizer-ranking-layout" id="organizerRankingsGrid"></div>
      </article>
    </section>

    <section class="sbw-organizer-tab-panel" id="organizerTabHistory" data-organizer-panel="history" hidden>
      <article class="sbw-organizer-section-card">
        <div class="sbw-organizer-section-head">
          <div>
            <span class="sbw-organizer-eyebrow">Histórico</span>
            <h2>Memória competitiva</h2>
          </div>
        </div>
        <div class="sbw-organizer-history-list" id="organizerHistoryList"></div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase/supabase-config.js"></script>
  <script src="../js/supabase/supabase-client.js"></script>
  <script src="../js/auth/auth-service.js"></script>
  <script src="../js/core/sbw-routes.js"></script>
  <script src="../js/core/sbw-session-context.js"></script>
  <script src="../js/layout/sbw-sidebar.js"></script>
  <script src="../js/tournaments/tournaments-config.js"></script>
  <script src="../js/tournaments/tournaments-demo-data.js"></script>
  <script src="../js/tournaments/tournaments-utils.js"></script>
  <script src="../js/tournaments/tournaments-models.js"></script>
  <script src="../js/tournaments/tournaments-storage.js"></script>
  <script src="../js/tournaments/tournament-organizer-page.js?v=1.6.57.5"></script>
  <script src="../js/core/sbw-page-state.js"></script>
  <script src="../js/core/sbw-site-compliance.js"></script>
</body>
</html>
