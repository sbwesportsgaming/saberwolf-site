<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Conectando conta -SBW-</title>

  <link rel="stylesheet" href="../css/auth.css" />
</head>

<body>
  <main class="sbw-auth-page">
    <section class="sbw-auth-card">
      <div class="sbw-auth-brand">
        <small>Login -SBW-</small>
        <h1>Conectando...</h1>
        <p>
          Estamos validando sua conta e preparando seu perfil na plataforma.
        </p>
      </div>

      <div class="sbw-auth-panel">
        <div class="sbw-auth-message" data-auth-message>
          Aguarde um instante...
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase/supabase-config.js"></script>
  <script src="../js/supabase/supabase-client.js"></script>
  <script src="../js/auth/auth-service.js"></script>

  <script>
    (async function () {
      const message = document.querySelector("[data-auth-message]");

      function setMessage(text, isError) {
        if (!message) return;

        message.textContent = text || "";
        message.classList.toggle("sbw-auth-error", Boolean(isError));
      }

      try {
        setMessage("Validando sessão...");

        const session = await window.SBWAuth.getSession();

        if (!session) {
          setMessage("Não encontramos uma sessão ativa. Faça login novamente.", true);

          setTimeout(function () {
            window.location.href = "login.html";
          }, 1800);

          return;
        }

        setMessage("Criando ou atualizando seu perfil...");

        await window.SBWAuth.ensureCurrentUserProfile();

        window.location.href = window.SBWAuth.getAfterLoginUrl();
      } catch (error) {
        console.error(error);
        setMessage(error.message || "Erro ao concluir login.", true);

        setTimeout(function () {
          window.location.href = "login.html";
        }, 2200);
      }
    })();
  </script>
</body>
</html>
