<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login -SBW-</title>

  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/core/sbw-site-compliance.css" />
</head>

<body>
  <main class="sbw-auth-page">
    <section class="sbw-auth-card">
      <div class="sbw-auth-brand">
        <small>Login -SBW-</small>

        <h1>-SBW-</h1>

        <p>
          Entre na sua conta para participar de torneios, gerenciar inscrições,
          acessar equipes e acompanhar sua trajetória dentro da plataforma.
        </p>

        <p>
          SaberWolf será a equipe de eSports. A plataforma e o ecossistema serão
          padronizados como <strong>-SBW-</strong>.
        </p>
      </div>

      <div class="sbw-auth-panel">
        <div class="sbw-auth-tabs">
          <button class="sbw-auth-tab is-active" type="button" data-auth-tab="login">
            Entrar
          </button>

          <button class="sbw-auth-tab" type="button" data-auth-tab="signup">
            Criar conta
          </button>
        </div>

        <div class="sbw-auth-message" data-auth-message></div>

        <form class="sbw-auth-form is-active" data-auth-form="login">
          <label class="sbw-auth-field">
            <span>E-mail</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>

          <label class="sbw-auth-field">
            <span>Senha</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>

          <button class="sbw-auth-button" type="submit">
            Entrar na conta
          </button>

          <p class="sbw-auth-inline-link">
            <a href="esqueci-senha.html">Esqueci minha senha</a>
          </p>
        </form>

        <form class="sbw-auth-form" data-auth-form="signup">
          <label class="sbw-auth-field">
            <span>Nome público</span>
            <input type="text" name="displayName" autocomplete="name" placeholder="Ex.: PlayerSBW" required />
          </label>

          <label class="sbw-auth-field">
            <span>E-mail</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>

          <label class="sbw-auth-field">
  <span>Senha</span>
  <input type="password" name="password" autocomplete="new-password" minlength="8" required />
</label>

<label class="sbw-auth-field">
  <span>Confirmar senha</span>
  <input type="password" name="confirmPassword" autocomplete="new-password" minlength="8" required />
</label>

<button class="sbw-auth-button" type="submit">
  Criar conta -SBW-
</button>
        </form>

        <div class="sbw-auth-socials">
          <button class="sbw-auth-social" type="button" data-auth-provider="google">
            Entrar com Google
          </button>

          <button class="sbw-auth-social" type="button" data-auth-provider="discord">
            Entrar com Discord
          </button>
        </div>

        <div class="sbw-auth-footer">
          <a href="../index.html">Voltar para o site</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase/supabase-config.js"></script>
  <script src="../js/supabase/supabase-client.js"></script>
  <script src="../js/auth/auth-service.js"></script>
<script src="../js/core/sbw-routes.js"></script>

  <script>
    (function () {
      const message = document.querySelector("[data-auth-message]");
      const tabs = document.querySelectorAll("[data-auth-tab]");
      const forms = document.querySelectorAll("[data-auth-form]");
      const providerButtons = document.querySelectorAll("[data-auth-provider]");

      function setMessage(text, isError) {
        if (!message) return;

        message.textContent = text || "";
        message.classList.toggle("sbw-auth-error", Boolean(isError));
      }

      function setActiveTab(tabName) {
        tabs.forEach(function (tab) {
          tab.classList.toggle("is-active", tab.dataset.authTab === tabName);
        });

        forms.forEach(function (form) {
          form.classList.toggle("is-active", form.dataset.authForm === tabName);
        });

        setMessage("");
      }

      tabs.forEach(function (tab) {
        tab.addEventListener("click", function () {
          setActiveTab(tab.dataset.authTab);
        });
      });

      const loginForm = document.querySelector('[data-auth-form="login"]');
      const signupForm = document.querySelector('[data-auth-form="signup"]');

      if (loginForm) {
        loginForm.addEventListener("submit", async function (event) {
          event.preventDefault();

          const formData = new FormData(loginForm);
          const email = String(formData.get("email") || "").trim();
          const password = String(formData.get("password") || "");

          try {
            setMessage("Entrando...");

            const result = await window.SBWAuth.signInWithEmail(email, password);

            if (result.error) {
              setMessage(result.error.message || "Não foi possível entrar.", true);
              return;
            }

            await window.SBWAuth.ensureCurrentUserProfile();

            window.location.href = window.SBWAuth.getAfterLoginUrl();
          } catch (error) {
            console.error(error);
            setMessage(error.message || "Erro inesperado ao entrar.", true);
          }
        });
      }

      if (signupForm) {
        signupForm.addEventListener("submit", async function (event) {
          event.preventDefault();

          const formData = new FormData(signupForm);
          const displayName = String(formData.get("displayName") || "").trim();
          const email = String(formData.get("email") || "").trim();
          const password = String(formData.get("password") || "");
          const confirmPassword = String(formData.get("confirmPassword") || "");

          if (password !== confirmPassword) {
          setMessage("As senhas não conferem. Digite a mesma senha nos dois campos.", true);
          return;
       }

          try {
            setMessage("Criando conta...");

            const result = await window.SBWAuth.signUpWithEmail(email, password, displayName);

            if (result.error) {
              setMessage(result.error.message || "Não foi possível criar a conta.", true);
              return;
            }

            if (result.data && result.data.user && result.data.session) {
              await window.SBWAuth.ensureCurrentUserProfile();
              window.location.href = window.SBWAuth.getAfterLoginUrl();
              return;
            }

            setMessage("Conta criada. Verifique seu e-mail para confirmar o cadastro.");
          } catch (error) {
            console.error(error);
            setMessage(error.message || "Erro inesperado ao criar conta.", true);
          }
        });
      }

      providerButtons.forEach(function (button) {
        button.addEventListener("click", async function () {
          const provider = button.dataset.authProvider;

          try {
            setMessage("Redirecionando para " + provider + "...");
            const result = await window.SBWAuth.signInWithProvider(provider);

            if (result.error) {
              setMessage(result.error.message || "Erro ao iniciar login social.", true);
            }
          } catch (error) {
            console.error(error);
            setMessage(error.message || "Erro inesperado no login social.", true);
          }
        });
      });
    })();
  </script>
  <script src="../js/core/sbw-site-compliance.js"></script>
</body>
</html>
