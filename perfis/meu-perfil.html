<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>-SBW- | Meu perfil</title>

  <link rel="stylesheet" href="../css/layout/sbw-sidebar.css" />
<link rel="stylesheet" href="../css/core/sbw-page-state.css" />
<link rel="stylesheet" href="../css/profiles.css" />
  <link rel="stylesheet" href="../css/core/sbw-site-compliance.css" />
</head>
<body class="sbw-profile-admin-body sbw-has-sidebar sbw-sidebar-no-transition" data-sbw-active-page="profiles">
  <div id="sbwSidebarMount"></div>

  <button
    class="sbw-sidebar-toggle"
    type="button"
    aria-label="Abrir menu"
    data-sbw-sidebar-toggle
  >
    ☰
  </button>

  <div class="sbw-sidebar-backdrop" data-sbw-sidebar-close></div>

  <main class="sbw-profile-page sbw-profile-page-admin">
    <section data-profile-admin-root>
      <div class="sbw-page-state sbw-page-state--loading" aria-live="polite" aria-busy="true">
        <div class="sbw-page-state__orb" aria-hidden="true"></div>
        <div>
          <strong>Carregando painel do perfil</strong>
          <p>Buscando seu perfil, equipe atual, convites e histórico competitivo.</p>
          <div class="sbw-skeleton-stack">
            <span class="sbw-skeleton-line is-wide"></span>
            <span class="sbw-skeleton-line"></span>
            <span class="sbw-skeleton-line"></span>
          </div>
        </div>
      </div>
    </section>
  </main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase/supabase-config.js"></script>
<script src="../js/supabase/supabase-client.js"></script>
<script src="../js/auth/auth-service.js"></script>
<script src="../js/core/sbw-routes.js"></script>
<script src="../js/teams/teams-config.js"></script>
<script src="../js/teams/teams-models.js"></script>
<script src="../js/teams/teams-storage.js"></script>
  <script src="../js/core/sbw-session-context.js"></script>
<script src="../js/core/sbw-page-state.js"></script>
<script src="../js/layout/sbw-sidebar.js"></script>
<script src="../js/auth/auth-header.js"></script>

<script src="../js/profiles/profiles-config.js"></script>
<script src="../js/profiles/profiles-models.js"></script>
<script src="../js/profiles/profiles-storage.js"></script>
<script src="../js/profiles/profile-admin-page.js"></script>

  <script src="../js/core/sbw-site-compliance.js"></script>
</body>
</html>
