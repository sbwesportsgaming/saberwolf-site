<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SaberWolf | Perfil</title>

  <link rel="stylesheet" href="../css/layout/sbw-sidebar.css" />
  <link rel="stylesheet" href="../css/profiles.css" />
  <link rel="stylesheet" href="../css/core/sbw-page-state.css" />
  <link rel="stylesheet" href="../css/core/sbw-site-compliance.css" />
</head>

<body class="sbw-profile-public-body sbw-has-sidebar sbw-sidebar-no-transition" data-sbw-active-page="profiles">
  <div id="sbwSidebarMount"></div>

  <button
    class="sbw-sidebar-toggle"
    type="button"
    aria-label="Abrir menu"
    data-sbw-sidebar-toggle
  >
    ☰
  </button>

  <div class="sbw-sidebar-backdrop" data-sbw-sidebar-close></div>

  <main class="sbw-profile-page">
    <section data-profile-public-root>
      <div class="sbw-empty-state">
        Carregando perfil...
      </div>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../js/supabase/supabase-config.js"></script>
  <script defer src="../js/supabase/supabase-client.js"></script>
  <script defer src="../js/auth/auth-service.js"></script>
<script defer src="../js/core/sbw-routes.js"></script>
  <script defer src="../js/core/sbw-session-context.js"></script>
  <script defer src="../js/layout/sbw-sidebar.js"></script>

  <script defer src="../js/profiles/profiles-config.js"></script>
  <script defer src="../js/profiles/profiles-models.js"></script>
  <script defer src="../js/profiles/profiles-storage.js"></script>
  <script defer src="../js/core/sbw-page-state.js"></script>
  <script defer src="../js/profiles/profile-public-page.js"></script>
  <script src="../js/core/sbw-site-compliance.js"></script>
